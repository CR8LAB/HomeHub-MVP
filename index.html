<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>
        HomeHub
    </title>
</head>
<body>
   

<div id="app">

<!-----Header--------------->
       
<!-------------------->
<header>
<div class="logo-img">
    <img src="" alt="">
  </div>
<h1>HomeHub</h1>
<div id="time"></div>
<h2>Good Morning</h2>
</header>

<!------Main-------------->
        
<!-------------------->

<main id="app-content">
<div class="container">
    <div class="row">
 <div class="col-lg-6">

    <div class="card">

        <h2>Welcome Home</h2>

        <p>LinkBase HomeHub</p>

        <p>Your Smart Home Companion</p>

    </div>

</div>
    </div>
</div>
</main>



<!-------Footer------------->
         
<!-------------------->

<footer>

<div class="d-flex justify-content-around">
    <div class="nav-btns row">
<div class="col">

    <button id="home-btn" class="nav-btn">

<i class="bi bi-house"></i>

<p>Home</p>

    </button>

 <button id="weather-btn" class="nav-btn"> 

<i class="bi bi-sun-fill"></i>

<p>Weather</p>

 </button>

<button id="to-do-btn" class="nav-btn">

<i class="bi bi-card-checklist"></i>

<p>To-Do</p>

</button>

 <button id="home-info-btn" class="nav-btn">

<i class="bi bi-check2-square"></i>

<p>Home Info</p>

 </button>

 <button id="emergency-btn" class="nav-btn">

<i class="bi bi-shield-exclamation"></i>

<p>Emergency</p>

 </button>

 <button id="settings-btn" class="nav-btn">

<i class="bi bi-gear-fill"></i>

<p>Settings</p>


 </button>

</div>
</footer>

</div>






<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
